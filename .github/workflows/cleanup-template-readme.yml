name: Cleanup Template README

on:
  push:
    branches: [main]

jobs:
  cleanup:
    # Only run in repos created from the template, not in the template itself
    if: github.repository != 'mburakunuvar/gh-copilot-JUNE26-LIVE-DEMO-DONT-DELETE'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Remove template section from README
        run: |
          if grep -q 'TEMPLATE_README_START' README.md; then
            sed -i '/<!-- TEMPLATE_README_START -->/,/<!-- TEMPLATE_README_END -->/d' README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: remove template section from README"
            git push
          fi

      - name: Disable this workflow
        run: |
          git pull
          if [ -f .github/workflows/cleanup-template-readme.yml ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm .github/workflows/cleanup-template-readme.yml
            git commit -m "chore: remove cleanup workflow (no longer needed)"
            git push
          fi
